[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
ignore_missing_imports = True

[tool:pytest]
asyncio_mode = auto
testpaths = tests

[tool:ruff]
line-length = 120
select = ["E", "F", "W", "I", "N", "UP"]

[tool:black]
line-length = 120
target-version = ["py310"]
